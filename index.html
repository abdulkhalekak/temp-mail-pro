<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রো টেম্প মেইল v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full glass-card rounded-3xl p-6 shadow-2xl">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-400">
            <i class="fas fa-envelope-open-text mr-2"></i>প্রো টেম্প মেইল
        </h1>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-400 mb-2">আপনার মেইল (এডিট করতে পারেন):</label>
            <div class="flex items-center bg-slate-900 rounded-xl p-1 border border-slate-700 focus-within:border-blue-500 transition">
                <input type="text" id="mailAddress" 
                    class="bg-transparent w-full p-3 outline-none text-blue-300 font-mono text-sm" 
                    placeholder="example@1secmail.com">
                <button onclick="copyEmail()" class="px-4 py-2 text-gray-400 hover:text-white transition">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
            <p class="text-[10px] text-gray-500 mt-1 italic">* আগের মেইল থাকলে এখানে বসিয়ে রিফ্রেশ দিন।</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="generateMail()" class="bg-emerald-600 hover:bg-emerald-500 p-3 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/20">
                <i class="fas fa-magic" id="genIcon"></i> নতুন মেইল
            </button>
            <button onclick="checkMail()" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                <i class="fas fa-sync" id="refreshIcon"></i> রিফ্রেশ ইনবক্স
            </button>
        </div>

        <div class="bg-slate-900/50 rounded-2xl p-4 min-h-[250px] border border-slate-800">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2 mb-4">
                <h3 class="text-lg font-semibold text-gray-300">ইনবক্স</h3>
                <span id="status" class="text-xs text-gray-500">অপেক্ষমাণ...</span>
            </div>
            <div id="inbox" class="space-y-3">
                <div class="text-center py-10">
                    <i class="fas fa-inbox text-4xl text-slate-700 mb-2"></i>
                    <p class="text-gray-500">কোনো মেসেজ নেই</p>
                </div>
            </div>
        </div>
    </div>

    <div id="msgModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 w-full max-w-2xl rounded-2xl p-6 relative border border-slate-700">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-3xl">&times;</button>
            <div id="msgContent" class="mt-4 text-gray-200 overflow-y-auto max-h-[75vh]"></div>
        </div>
    </div>

    <script>
        // মেইল জেনারেট
        async function generateMail() {
            const icon = document.getElementById('genIcon');
            icon.classList.add('loading-spin');
            try {
                const res = await fetch('https://www.1secmail.com/api/v1/?action=genEmailDevice&count=1');
                const data = await res.json();
                document.getElementById('mailAddress').value = data[0];
                checkMail();
            } catch (err) {
                alert("সার্ভার সমস্যা! VPN বন্ধ করে চেষ্টা করুন।");
            } finally {
                icon.classList.remove('loading-spin');
            }
        }

        // ইনবক্স চেক
        async function checkMail() {
            const fullMail = document.getElementById('mailAddress').value;
            if (!fullMail || !fullMail.includes('@')) return alert("সঠিক মেইল এড্রেস দিন!");
            
            const [login, domain] = fullMail.split('@');
            const icon = document.getElementById('refreshIcon');
            const status = document.getElementById('status');
            
            icon.classList.add('loading-spin');
            status.innerText = "চেক করা হচ্ছে...";

            try {
                const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`);
                const emails = await res.json();
                
                const inbox = document.getElementById('inbox');
                if (emails.length === 0) {
                    inbox.innerHTML = '<div class="text-center py-10 text-gray-500">ইনবক্স খালি!</div>';
                } else {
                    inbox.innerHTML = emails.map(msg => `
                        <div onclick="viewMessage('${login}', '${domain}', ${msg.id})" class="bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition shadow-sm">
                            <p class="text-xs text-blue-400 font-bold mb-1">${msg.from}</p>
                            <p class="text-sm text-gray-200 font-medium truncate">${msg.subject}</p>
                            <p class="text-[10px] text-gray-500 mt-2"><i class="far fa-clock mr-1"></i>${msg.date}</p>
                        </div>
                    `).join('');
                }
                status.innerText = "আপডেটেড";
            } catch (err) {
                status.innerText = "এরর!";
            } finally {
                icon.classList.remove('loading-spin');
            }
        }

        // মেসেজ পড়া
        async function viewMessage(login, domain, id) {
            try {
                const res = await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${login}&domain=${domain}&id=${id}`);
                const data = await res.json();
                
                document.getElementById('msgContent').innerHTML = `
                    <div class="mb-4">
                        <h2 class="text-xl font-bold text-blue-400">${data.subject}</h2>
                        <p class="text-xs text-gray-500 mt-1">থেকে: ${data.from} | সময়: ${data.date}</p>
                    </div>
                    <div class="bg-white text-black p-4 rounded-xl overflow-x-auto">
                        ${data.htmlBody ? data.htmlBody : `<pre class="whitespace-pre-wrap">${data.body}</pre>`}
                    </div>
                `;
                document.getElementById('msgModal').classList.remove('hidden');
            } catch (err) {
                alert("মেসেজ লোড করা যায়নি!");
            }
        }

        function copyEmail() {
            const emailField = document.getElementById('mailAddress');
            emailField.select();
            document.execCommand('copy');
            alert("কপি হয়েছে!");
        }

        function closeModal() {
            document.getElementById('msgModal').classList.add('hidden');
        }
    </script>
</body>
</html>
