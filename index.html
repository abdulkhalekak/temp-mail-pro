<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রো টেম্প মেইল v4 - অ্যাডভান্স</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050811; color: #cbd5e1; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        /* Toast Animation */
        #toast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #1e293b; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 30px; border: 1px solid #3b82f6; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="toast">মেসেজ এখানে আসবে</div>

    <div class="max-w-md w-full glass rounded-[2rem] p-6 shadow-2xl">
        <header class="text-center mb-8">
            <div class="inline-block p-3 bg-blue-600/20 rounded-full mb-3">
                <i class="fas fa-bolt text-2xl text-blue-500"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight text-white">প্রো টেম্প মেইল <span class="text-blue-500 text-xs">অ্যাডভান্স</span></h1>
        </header>

        <div class="space-y-5">
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-500 ml-1 mb-2 block">অস্থায়ী ইমেইল এড্রেস</label>
                <div class="relative group">
                    <input type="text" id="emailDisplay" class="bg-black/50 w-full p-4 pr-12 rounded-2xl outline-none border border-gray-800 focus:border-blue-500 transition font-mono text-sm text-blue-200" placeholder="মেইল জেনারেট করুন...">
                    <button onclick="copyMail()" class="absolute right-3 top-3 p-2 text-gray-500 hover:text-white transition">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="createNewAccount()" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl font-bold transition-all transform active:scale-95 shadow-lg shadow-blue-900/30">
                    <i class="fas fa-plus mr-1"></i> নতুন মেইল
                </button>
                <button onclick="loginWithCurrent()" class="bg-gray-800 hover:bg-gray-700 text-white p-4 rounded-2xl font-bold transition-all transform active:scale-95">
                    <i class="fas fa-sign-in-alt mr-1"></i> মেইল লগইন
                </button>
            </div>
            
            <button onclick="fetchMessages()" class="w-full bg-slate-900 hover:bg-slate-800 p-4 rounded-2xl font-bold border border-gray-800 transition flex items-center justify-center gap-3">
                <i class="fas fa-sync-alt" id="refreshIcon"></i> রিফ্রেশ ইনবক্স
            </button>
        </div>

        <div class="mt-8">
            <h3 class="text-xs font-bold text-gray-500 uppercase mb-4 px-1">ইনবক্স</h3>
            <div id="inbox" class="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                <div class="text-center py-12 text-gray-600 italic text-sm">
                    কোনো মেসেজ পাওয়া যায়নি
                </div>
            </div>
        </div>
    </div>

    <div id="msgModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-gray-900 w-full max-w-xl rounded-[2.5rem] p-8 border border-gray-800 relative shadow-3xl">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500 hover:text-white text-3xl">&times;</button>
            <div id="otpBox" class="hidden mb-6 p-4 bg-blue-900/20 border border-blue-500/30 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-blue-400 font-bold uppercase">শনাক্তকৃত কোড</p>
                    <h2 id="extractedCode" class="text-2xl font-black text-white tracking-widest">------</h2>
                </div>
                <button onclick="copyOTP()" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-500 text-white text-sm font-bold">কপি কোড</button>
            </div>
            <div id="msgContent" class="overflow-y-auto max-h-[60vh] text-sm leading-relaxed text-gray-300"></div>
        </div>
    </div>

    <script>
        const API = "https://api.mail.tm";
        let userToken = localStorage.getItem('temp_token') || "";
        let currentEmail = localStorage.getItem('temp_email') || "";

        if(currentEmail) document.getElementById('emailDisplay').value = currentEmail;

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
        }

        async function createNewAccount() {
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('spin');
            try {
                const domRes = await fetch(`${API}/domains`);
                const domData = await domRes.json();
                const domain = domData['hydra:member'][0].domain;
                const email = `ak${Math.floor(Date.now()/1000)}@${domain}`;
                const pass = "password123";

                await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });

                const tokenRes = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });
                const tokenData = await tokenRes.json();
                
                userToken = tokenData.token;
                currentEmail = email;
                localStorage.setItem('temp_token', userToken);
                localStorage.setItem('temp_email', currentEmail);
                document.getElementById('emailDisplay').value = email;
                showToast("নতুন মেইল তৈরি হয়েছে!");
                fetchMessages();
            } catch (e) {
                showToast("এরর হয়েছে! আবার ট্রাই করুন।");
            } finally {
                refreshIcon.classList.remove('spin');
            }
        }

        async function loginWithCurrent() {
            const inputEmail = document.getElementById('emailDisplay').value;
            if(!inputEmail.includes('@')) return showToast("সঠিক মেইল দিন!");
            
            showToast("এই মেইলে লগইন করার চেষ্টা করা হচ্ছে...");
            // নোট: Mail.tm এ আগের টোকেন ছাড়া লগইন করতে পাসওয়ার্ড লাগে। 
            // এই ভার্সনে আমরা লোকাল স্টোরেজ থেকে অটো রিকভার করি।
            if(userToken) {
                fetchMessages();
            } else {
                showToast("এই মেইলের টোকেন পাওয়া যায়নি।");
            }
        }

        async function fetchMessages() {
            if(!userToken) return showToast("আগে মেইল তৈরি করুন!");
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spin');

            try {
                const res = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${userToken}` }
                });
                const data = await res.json();
                const list = document.getElementById('inbox');
                const messages = data['hydra:member'];

                if(messages.length === 0) {
                    list.innerHTML = `<div class="text-center py-12 text-gray-600 italic">ইনবক্স খালি</div>`;
                } else {
                    list.innerHTML = messages.map(m => `
                        <div onclick="readMessage('${m.id}')" class="bg-slate-900/80 p-4 rounded-2xl border border-gray-800 hover:border-blue-500/50 cursor-pointer transition shadow-sm">
                            <p class="text-[10px] text-blue-500 font-black uppercase mb-1">${m.from.address}</p>
                            <p class="text-white font-medium truncate">${m.subject || '(নো সাবজেক্ট)'}</p>
                        </div>
                    `).join('');
                }
                showToast("ইনবক্স আপডেট হয়েছে");
            } catch (e) {
                showToast("মেসেজ লোড করা যায়নি");
            } finally {
                icon.classList.remove('spin');
            }
        }

        async function readMessage(id) {
            try {
                const res = await fetch(`${API}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${userToken}` }
                });
                const data = await res.json();
                const content = data.html ? data.html[0] : data.text;
                
                // OTP Extraction Logic
                const codeMatch = content.match(/\b\d{4,8}\b/);
                if(codeMatch) {
                    document.getElementById('extractedCode').innerText = codeMatch[0];
                    document.getElementById('otpBox').classList.remove('hidden');
                } else {
                    document.getElementById('otpBox').classList.add('hidden');
                }

                document.getElementById('msgContent').innerHTML = `<div class="bg-white text-black p-4 rounded-2xl">${content}</div>`;
                document.getElementById('msgModal').classList.remove('hidden');
            } catch (e) {
                showToast("মেসেজটি পড়া যাচ্ছে না");
            }
        }

        function copyMail() {
            const email = document.getElementById('emailDisplay');
            email.select();
            document.execCommand('copy');
            showToast("ইমেইল কপি হয়েছে!");
        }

        function copyOTP() {
            const code = document.getElementById('extractedCode').innerText;
            navigator.clipboard.writeText(code);
            showToast("কোড কপি হয়েছে: " + code);
        }

        function closeModal() { document.getElementById('msgModal').classList.add('hidden'); }
    </script>
</body>
</html>
