<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Pro V10 - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e14; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: rgba(23, 27, 34, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #toast { visibility: hidden; min-width: 250px; background: #2563eb; color: #fff; text-align: center; border-radius: 12px; padding: 14px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="toast">মেসেজ</div>

    <div class="max-w-md w-full glass rounded-[2.5rem] p-8">
        <h1 class="text-3xl font-black text-center mb-8 tracking-tighter">TEMP <span class="text-blue-500">PRO</span></h1>

        <div class="space-y-5">
            <div class="relative">
                <p class="text-[10px] text-gray-500 font-bold uppercase mb-2 ml-1">ইমেইল এড্রেস (টাইপ বা পেস্ট করুন)</p>
                <div class="flex items-center bg-black/40 rounded-2xl border border-gray-800 p-1">
                    <input type="text" id="emailDisplay" class="flex-1 bg-transparent p-3 outline-none font-mono text-sm text-blue-400" placeholder="মেইল এখানে লিখুন...">
                    <button onclick="copyMail()" class="p-3 text-gray-500 hover:text-white"><i class="fas fa-copy"></i></button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="createNewAccount()" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-2xl font-bold transition shadow-lg shadow-blue-900/20"><i class="fas fa-plus-circle mr-2"></i>নতুন মেইল</button>
                <button onclick="smartRestore()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl font-bold border border-gray-700 transition"><i class="fas fa-history mr-2"></i>রিস্টোর</button>
            </div>

            <button onclick="fetchMessages()" class="w-full bg-slate-900 p-4 rounded-2xl font-bold border border-gray-800 transition flex items-center justify-center gap-3">
                <i class="fas fa-sync-alt" id="refreshIcon"></i> রিফ্রেশ ইনবক্স
            </button>
        </div>

        <div class="mt-8">
            <h3 class="text-[11px] font-bold text-gray-600 uppercase mb-4 tracking-widest">ইনবক্স</h3>
            <div id="inbox" class="space-y-3 min-h-[160px] max-h-[300px] overflow-y-auto pr-1">
                <p class="text-center text-gray-700 italic py-12">মেসেজ পাওয়া যায়নি</p>
            </div>
        </div>
    </div>

    <div id="msgModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 w-full max-w-xl rounded-3xl p-6 border border-white/5 relative">
            <button onclick="closeModal()" class="absolute top-4 right-5 text-3xl text-gray-500 hover:text-white">&times;</button>
            <div id="otpBox" class="hidden mb-5 p-4 bg-blue-600/10 border border-blue-500/30 rounded-2xl flex justify-between items-center">
                <span id="otpVal" class="text-2xl font-black text-white tracking-widest font-mono"></span>
                <button onclick="copyOTP()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold text-white">COPY</button>
            </div>
            <div id="msgContent" class="overflow-y-auto max-h-[65vh] bg-white text-black p-4 rounded-2xl text-sm"></div>
        </div>
    </div>

    <script>
        const API = "https://api.mail.tm";
        let userToken = "";

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        async function createNewAccount() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spin');
            try {
                const domRes = await fetch(`${API}/domains`);
                const domData = await domRes.json();
                const domain = domData['hydra:member'][0].domain;
                const email = `ak${Math.floor(Date.now()/1000)}@${domain}`;
                const pass = "ak_123456";

                const res = await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });

                if(!res.ok) throw new Error("Account creation failed");

                const tokenRes = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });
                const tokenData = await tokenRes.json();
                userToken = tokenData.token;
                document.getElementById('emailDisplay').value = email;

                // মেমোরিতে সেভ
                let history = JSON.parse(localStorage.getItem('mail_vault') || '{}');
                history[email] = userToken;
                localStorage.setItem('mail_vault', JSON.stringify(history));

                showToast("নতুন মেইল চালু হয়েছে!");
                fetchMessages();
            } catch (e) {
                showToast("সার্ভার এরর! আবার চেষ্টা করুন।");
            } finally {
                icon.classList.remove('spin');
            }
        }

        function smartRestore() {
            const email = document.getElementById('emailDisplay').value.trim();
            const history = JSON.parse(localStorage.getItem('mail_vault') || '{}');

            if (history[email]) {
                userToken = history[email];
                showToast("মেইল রিস্টোর হয়েছে!");
                fetchMessages();
            } else {
                showToast("এই মেইলের টোকেন পাওয়া যায়নি!");
            }
        }

        async function fetchMessages() {
            if(!userToken) return showToast("আগে মেইল তৈরি বা রিস্টোর করুন!");
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spin');
            try {
                const res = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${userToken}` }
                });
                if(!res.ok) throw new Error("Fetch failed");
                const data = await res.json();
                const messages = data['hydra:member'];
                const list = document.getElementById('inbox');
                
                if(messages.length === 0) {
                    list.innerHTML = `<p class="text-center text-gray-700 py-12 italic">ইনবক্স খালি (Refresh দিন)</p>`;
                } else {
                    list.innerHTML = messages.map(m => `
                        <div onclick="readMsg('${m.id}')" class="bg-black/40 p-4 rounded-2xl border border-gray-800 cursor-pointer hover:border-blue-600 transition">
                            <p class="text-[9px] text-blue-500 font-bold mb-1 uppercase">${m.from.address}</p>
                            <p class="text-white text-sm truncate font-medium">${m.subject || 'No Subject'}</p>
                        </div>
                    `).join('');
                }
            } catch(e) { 
                showToast("ইনবক্স লোড এরর! আবার রিফ্রেশ দিন।"); 
            } finally {
                icon.classList.remove('spin');
            }
        }

        async function readMsg(id) {
            try {
                const res = await fetch(`${API}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${userToken}` }
                });
                const data = await res.json();
                const content = data.html ? data.html[0] : data.text;
                
                const code = content.match(/\b\d{4,8}\b/);
                if(code) {
                    document.getElementById('otpVal').innerText = code[0];
                    document.getElementById('otpBox').classList.remove('hidden');
                } else { document.getElementById('otpBox').classList.add('hidden'); }

                document.getElementById('msgContent').innerHTML = content;
                document.getElementById('msgModal').classList.remove('hidden');
            } catch (e) {
                showToast("মেসেজ পড়তে সমস্যা হচ্ছে।");
            }
        }

        function copyMail() {
            const el = document.getElementById('emailDisplay');
            el.select();
            document.execCommand('copy');
            showToast("মেইল কপি হয়েছে!");
        }

        function copyOTP() {
            navigator.clipboard.writeText(document.getElementById('otpVal').innerText);
            showToast("কোড কপি হয়েছে!");
        }

        function closeModal() { document.getElementById('msgModal').classList.add('hidden'); }
    </script>
</body>
</html>
