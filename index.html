<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMP PRO V16 - FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #030712; color: #f3f4f6; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #toast { visibility: hidden; min-width: 250px; background: #2563eb; color: white; text-align: center; border-radius: 1rem; padding: 12px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 600; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 italic">

    <div id="toast">মেসেজ</div>

    <div class="max-w-md w-full glass p-8 shadow-2xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-white italic">TEMP <span class="text-blue-500">PRO</span></h1>
            <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-bold">Stable Engine: V16</p>
        </header>

        <div class="space-y-6">
            <div>
                <input type="text" id="email" class="w-full bg-black/40 p-4 rounded-2xl border border-gray-800 outline-none text-blue-400 font-mono text-sm" placeholder="মেইল জেনারেট করুন..." readonly>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="createNew()" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-2xl font-bold transition flex items-center justify-center gap-2">
                    <i class="fas fa-plus-circle"></i> নতুন মেইল
                </button>
                <button onclick="restore()" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl font-bold border border-gray-700 flex items-center justify-center gap-2">
                    <i class="fas fa-history"></i> রিস্টোর
                </button>
            </div>

            <button onclick="fetchInbox()" class="w-full bg-slate-900 p-4 rounded-2xl font-bold border border-gray-800 flex items-center justify-center gap-3 transition">
                <i class="fas fa-sync-alt" id="loadIcon"></i> রিফ্রেশ ইনবক্স
            </button>
        </div>

        <div id="inboxList" class="mt-8 space-y-3 min-h-[150px] max-h-[300px] overflow-y-auto pr-2">
            <p class="text-center text-gray-600 py-10">কোনো মেসেজ নেই</p>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-900 w-full max-w-xl rounded-[2rem] p-6 border border-white/5 relative">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-3xl text-gray-500">&times;</button>
            <div id="otpSec" class="hidden mb-6 p-4 bg-blue-600/10 border border-blue-600/30 rounded-2xl text-center">
                <p class="text-[10px] text-blue-400 font-bold mb-1">YOUR CODE</p>
                <span id="otpVal" class="text-4xl font-black text-white tracking-[0.3em] font-mono"></span>
            </div>
            <div id="mailBody" class="overflow-y-auto max-h-[50vh] bg-white text-black p-4 rounded-2xl text-sm"></div>
        </div>
    </div>

    <script>
        const API = "https://api.mail.tm";
        let token = localStorage.getItem('tm_token');
        let address = localStorage.getItem('tm_addr');

        if(address) document.getElementById('email').value = address;

        function toast(m) {
            const t = document.getElementById("toast");
            t.innerText = m; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        async function createNew() {
            const icon = document.getElementById('loadIcon');
            icon.classList.add('spin');
            try {
                const dRes = await fetch(`${API}/domains`);
                const dData = await dRes.json();
                const domain = dData['hydra:member'][0].domain;
                const newEmail = `ak${Math.floor(Math.random()*999999)}@${domain}`;
                const pass = "password123";

                await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: newEmail, password: pass })
                });

                const tRes = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: newEmail, password: pass })
                });
                const tData = await tRes.json();
                
                token = tData.token;
                address = newEmail;
                localStorage.setItem('tm_token', token);
                localStorage.setItem('tm_addr', address);
                document.getElementById('email').value = address;
                toast("মেইল তৈরি হয়েছে!");
                fetchInbox();
            } catch (e) { toast("সার্ভার এরর!"); }
            finally { icon.classList.remove('spin'); }
        }

        function restore() {
            if(address) {
                document.getElementById('email').value = address;
                toast("রিস্টোর সফল!");
                fetchInbox();
            } else toast("ডাটা নেই!");
        }

        async function fetchInbox() {
            if(!token) return toast("আগে মেইল তৈরি করুন!");
            const icon = document.getElementById('loadIcon');
            icon.classList.add('spin');
            try {
                const res = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const msgs = data['hydra:member'];
                const list = document.getElementById('inboxList');

                if(msgs.length === 0) list.innerHTML = `<p class="text-center text-gray-700 py-10">ইনবক্স খালি</p>`;
                else {
                    list.innerHTML = msgs.map(m => `
                        <div onclick="openMail('${m.id}')" class="bg-black/50 p-4 rounded-2xl border border-gray-800 hover:border-blue-500 cursor-pointer transition">
                            <p class="text-[10px] text-blue-500 font-bold mb-1">${m.from.address}</p>
                            <p class="text-white text-sm truncate font-medium">${m.subject || '(No Subject)'}</p>
                        </div>
                    `).join('');
                }
            } catch (e) { toast("ইনবক্স এরর!"); }
            finally { icon.classList.remove('spin'); }
        }

        async function openMail(id) {
            try {
                const res = await fetch(`${API}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const d = await res.json();
                const body = d.html ? d.html[0] : d.text;
                const otp = body.match(/\b\d{4,8}\b/);
                
                if(otp) {
                    document.getElementById('otpVal').innerText = otp[0];
                    document.getElementById('otpSec').classList.remove('hidden');
                } else document.getElementById('otpSec').classList.add('hidden');

                document.getElementById('mailBody').innerHTML = body;
                document.getElementById('modal').classList.remove('hidden');
            } catch(e) { toast("পড়া যাচ্ছে না!"); }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
