<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রো টেম্প মেইল v7 - অটো রিস্টোর</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050811; color: #cbd5e1; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #toast { visibility: hidden; min-width: 250px; background: #3b82f6; color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; font-size: 14px; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="toast">মেসেজ</div>

    <div class="max-w-md w-full glass rounded-[2.5rem] p-7 shadow-2xl border border-blue-500/10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black text-white tracking-tighter">TEMP <span class="text-blue-500">PRO</span></h1>
            <div class="h-1 w-12 bg-blue-500 mx-auto mt-2 rounded-full"></div>
        </header>

        <div class="space-y-6">
            <div class="relative">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2 block">আপনার ইমেইল এড্রেস</label>
                <input type="text" id="emailDisplay" class="bg-black/60 w-full p-4 rounded-2xl outline-none border border-gray-800 focus:border-blue-600 transition font-mono text-sm text-blue-300" placeholder="এখানে মেইল লিখুন বা তৈরি করুন...">
                <button onclick="copyMail()" class="absolute right-4 bottom-3.5 text-gray-500 hover:text-white transition">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="createNewAccount()" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl font-bold transition transform active:scale-95 shadow-lg shadow-blue-900/40">
                    <i class="fas fa-magic mr-2"></i>নতুন মেইল
                </button>
                <button onclick="smartRestore()" class="bg-slate-800 hover:bg-slate-700 text-white p-4 rounded-2xl font-bold transition border border-gray-700">
                    <i class="fas fa-history mr-2"></i>রিস্টোর
                </button>
            </div>
            
            <button onclick="fetchMessages()" class="w-full bg-slate-900/50 hover:bg-slate-800 p-4 rounded-2xl font-bold border border-gray-800 transition flex items-center justify-center gap-3">
                <i class="fas fa-sync-alt" id="refreshIcon"></i> রিফ্রেশ ইনবক্স
            </button>
        </div>

        <div class="mt-8">
            <h3 class="text-xs font-bold text-gray-600 uppercase mb-4 px-1">ইনবক্স</h3>
            <div id="inbox" class="space-y-3 min-h-[150px] max-h-[300px] overflow-y-auto pr-2">
                <p class="text-center text-gray-700 italic py-10">কোনো মেসেজ নেই</p>
            </div>
        </div>
    </div>

    <div id="msgModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-gray-900 w-full max-w-xl rounded-[2rem] p-6 border border-gray-800 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-3xl text-gray-500">&times;</button>
            <div id="otpSection" class="hidden mb-4 p-4 bg-blue-600/10 border border-blue-500/30 rounded-2xl flex justify-between items-center">
                <span id="otpVal" class="text-2xl font-black text-white tracking-widest font-mono"></span>
                <button onclick="copyOTP()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">COPY OTP</button>
            </div>
            <div id="msgContent" class="overflow-y-auto max-h-[60vh] bg-white text-black p-4 rounded-xl text-sm"></div>
        </div>
    </div>

    <script>
        const API = "https://api.mail.tm";
        let userToken = "";

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        // ডাটাবেস হ্যান্ডলার (LocalStorage)
        function saveToHistory(email, token) {
            let history = JSON.parse(localStorage.getItem('mail_history') || '{}');
            history[email] = token;
            localStorage.setItem('mail_history', JSON.stringify(history));
        }

        async function createNewAccount() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spin');
            try {
                const domRes = await fetch(`${API}/domains`);
                const domData = await domRes.json();
                const domain = domData['hydra:member'][0].domain;
                const email = `ak${Math.floor(Date.now()/1000)}@${domain}`;
                const pass = "ak_pass_123";

                await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });

                const tokenRes = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });
                const tokenData = await tokenRes.json();
                
                userToken = tokenData.token;
                document.getElementById('emailDisplay').value = email;
                
                // মেমোরিতে সেভ করে রাখা হচ্ছে
                saveToHistory(email, userToken);
                
                showToast("নতুন মেইল জেনারেট হয়েছে!");
                fetchMessages();
            } catch (e) { showToast("এরর হয়েছে!"); }
            finally { icon.classList.remove('spin'); }
        }

        // স্মার্ট রিস্টোর সিস্টেম (পাসওয়ার্ড লাগবে না)
        function smartRestore() {
            const email = document.getElementById('emailDisplay').value.trim();
            const history = JSON.parse(localStorage.getItem('mail_history') || '{}');

            if (history[email]) {
                userToken = history[email];
                showToast("মেইল রিস্টোর সফল!");
                fetchMessages();
            } else {
                showToast("এই মেইলটির মেমোরি পাওয়া যায়নি!");
            }
        }

        async function fetchMessages() {
            if(!userToken) return showToast("মেইল তৈরি বা রিস্টোর করুন!");
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spin');
            try {
                const res = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${userToken}` }
                });
                const data = await res.json();
                const messages = data['hydra:member'];
                const list = document.getElementById('inbox');
                
                if(messages.length === 0) {
                    list.innerHTML = `<p class="text-center text-gray-700 py-10 italic">ইনবক্স খালি</p>`;
                } else {
                    list.innerHTML = messages.map(m => `
                        <div onclick="readMsg('${m.id}')" class="bg-slate-900/80 p-4 rounded-2xl border border-gray-800 cursor-pointer hover:border-blue-600 transition">
                            <p class="text-[10px] text-blue-500 font-bold mb-1 uppercase">${m.from.address}</p>
                            <p class="text-white text-sm truncate">${m.subject || '(No Subject)'}</p>
                        </div>
                    `).join('');
                }
            } catch(e) { showToast("ইনবক্স এরর!"); }
            finally { icon.classList.remove('spin'); }
        }

        async function readMsg(id) {
            const res = await fetch(`${API}/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${userToken}` }
            });
            const data = await res.json();
            const content = data.html ? data.html[0] : data.text;
            
            const code = content.match(/\b\d{4,8}\b/);
            if(code) {
                document.getElementById('otpVal').innerText = code[0];
                document.getElementById('otpSection').classList.remove('hidden');
            } else { document.getElementById('otpSection').classList.add('hidden'); }

            document.getElementById('msgContent').innerHTML = content;
            document.getElementById('msgModal').classList.remove('hidden');
        }

        function copyMail() {
            const el = document.getElementById('emailDisplay');
            if(!el.value) return;
            el.select(); document.execCommand('copy');
            showToast("মেইল কপি হয়েছে!");
        }

        function copyOTP() {
            navigator.clipboard.writeText(document.getElementById('otpVal').innerText);
            showToast("কোড কপি হয়েছে!");
        }

        function closeModal() { document.getElementById('msgModal').classList.add('hidden'); }
    </script>
</body>
</html>
