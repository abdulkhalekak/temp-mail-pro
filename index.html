<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMP PRO v8 - Smart Restore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050811; color: #cbd5e1; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #toast { visibility: hidden; min-width: 280px; background: #3b82f6; color: #fff; text-align: center; border-radius: 50px; padding: 14px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="toast">মেসেজ</div>

    <div class="max-w-md w-full glass rounded-[2.5rem] p-7 shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black text-white tracking-tighter">TEMP <span class="text-blue-500 font-serif italic">PRO</span></h1>
            <div class="h-1 w-12 bg-blue-500 mx-auto mt-2 rounded-full"></div>
        </header>

        <div class="space-y-6">
            <div class="relative">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2 block">আপনার ইমেইল এড্রেস (ইডিট করতে পারেন)</label>
                <div class="relative group">
                    <input type="text" id="emailDisplay" 
                        class="bg-black/60 w-full p-4 rounded-2xl outline-none border border-gray-800 focus:border-blue-600 transition font-mono text-sm text-blue-300" 
                        placeholder="মেইল এখানে লিখুন...">
                    <button onclick="copyMail()" class="absolute right-4 top-3.5 text-gray-500 hover:text-white transition">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="createNewAccount()" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl font-bold transition transform active:scale-95 shadow-lg shadow-blue-900/40">
                    <i class="fas fa-plus-circle mr-2"></i>নতুন মেইল
                </button>
                <button onclick="smartRestore()" class="bg-slate-800 hover:bg-slate-700 text-white p-4 rounded-2xl font-bold transition border border-gray-700">
                    <i class="fas fa-history mr-2"></i>রিস্টোর
                </button>
            </div>
            
            <button onclick="fetchMessages()" class="w-full bg-slate-900/50 hover:bg-slate-800 p-4 rounded-2xl font-bold border border-gray-800 transition flex items-center justify-center gap-3 shadow-inner">
                <i class="fas fa-sync-alt" id="refreshIcon"></i> রিফ্রেশ ইনবক্স
            </button>
        </div>

        <div class="mt-8">
            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="text-xs font-bold text-gray-600 uppercase tracking-widest">ইনবক্স</h3>
                <span id="statusLabel" class="text-[9px] text-blue-500/50 italic font-bold">LIVE</span>
            </div>
            <div id="inbox" class="space-y-3 min-h-[150px] max-h-[300px] overflow-y-auto pr-2">
                <p class="text-center text-gray-700 italic py-12">কোনো মেসেজ নেই</p>
            </div>
        </div>
    </div>

    <div id="msgModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-gray-900 w-full max-w-xl rounded-[2rem] p-6 border border-gray-800 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-3xl text-gray-500">&times;</button>
            <div id="otpSection" class="hidden mb-4 p-4 bg-blue-600/10 border border-blue-500/30 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-[9px] text-blue-400 font-bold uppercase">ওটিপি কোড</p>
                    <span id="otpVal" class="text-2xl font-black text-white tracking-widest font-mono"></span>
                </div>
                <button onclick="copyOTP()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold text-white shadow-lg">COPY</button>
            </div>
            <div id="msgContent" class="overflow-y-auto max-h-[60vh] bg-white text-black p-4 rounded-xl text-sm"></div>
        </div>
    </div>

    <script>
        const API = "https://api.mail.tm";
        let userToken = "";

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        // হিস্টোরি সেভ রাখা
        function saveToHistory(email, token) {
            let history = JSON.parse(localStorage.getItem('mail_history') || '{}');
            history[email] = token;
            localStorage.setItem('mail_history', JSON.stringify(history));
        }

        async function createNewAccount() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spin');
            try {
                const domRes = await fetch(`${API}/domains`);
                const domData = await domRes.json();
                const domain = domData['hydra:member'][0].domain;
                const email = `ak${Math.floor(Date.now()/1000)}@${domain}`;
                const pass = "ak_pass_123";

                await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });

                const tokenRes = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: pass })
                });
                const tokenData = await tokenRes.json();
                
                userToken = tokenData.token;
                document.getElementById('emailDisplay').value = email;
                saveToHistory(email, userToken);
                showToast("নতুন মেইল তৈরি হয়েছে!");
                fetchMessages();
            } catch (e) { showToast("এরর হয়েছে! নেট চেক করুন।"); }
            finally { icon.classList.remove('spin'); }
        }

        // স্মার্ট রিস্টোর (পাসওয়ার্ড ছাড়া)
        function smartRestore() {
            const email = document.getElementById('emailDisplay').value.trim();
            const history = JSON.parse(localStorage.getItem('mail_history') || '{}');

            if (history[email]) {
                userToken = history[email];
                showToast("মেইল রিস্টোর সফল!");
                fetchMessages();
            } else {
                showToast("এই মেইলের টোকেন মেমোরিতে নেই!");
            }
        }

        async function fetchMessages() {
            if(!userToken) return showToast("প্রথমে মেইল তৈরি বা রিস্টোর করুন!");
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spin');
            try {
                const res = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${userToken}` }
                });
                const data = await res.json();
                const messages = data['hydra:member'];
                const list = document.getElementById('inbox');
                
                if(messages.length === 0) {
                    list.innerHTML = `<p
